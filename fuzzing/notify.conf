# notify.conf — Notification configuration for the fuzzing pipeline.
#
# Copy this file to fuzzing/notify.conf and fill in what you need.
# Any channel with an empty value is silently skipped.
# notify.sh sources this file automatically.

# ---------------------------------------------------------------------------
# Desktop notification (Linux, via notify-send)
# Set to "1" to enable. Works in any graphical session (X11/Wayland).
# ---------------------------------------------------------------------------
NOTIFY_DESKTOP=1

# ---------------------------------------------------------------------------
# Slack webhook
# Create one at: https://api.slack.com/messaging/webhooks
# Example: https://hooks.slack.com/services/T.../B.../xxx
# ---------------------------------------------------------------------------
NOTIFY_SLACK_WEBHOOK=""

# ---------------------------------------------------------------------------
# Discord webhook
# Create one in Server Settings → Integrations → Webhooks
# Example: https://discord.com/api/webhooks/123/abc
# ---------------------------------------------------------------------------
NOTIFY_DISCORD_WEBHOOK=""

# ---------------------------------------------------------------------------
# Generic HTTP webhook (POST with JSON body)
# { "text": "<message>" } is sent.
# ---------------------------------------------------------------------------
NOTIFY_WEBHOOK_URL=""

# ---------------------------------------------------------------------------
# Email (via local `mail` command or sendmail)
# Leave NOTIFY_EMAIL empty to disable.
# ---------------------------------------------------------------------------
NOTIFY_EMAIL=""
NOTIFY_EMAIL_FROM="fuzz-bot@localhost"
NOTIFY_EMAIL_SUBJECT_PREFIX="[FUZZ]"

# ---------------------------------------------------------------------------
# Log file (always written, regardless of other settings)
# Relative paths are resolved from PROJECT_ROOT.
# ---------------------------------------------------------------------------
NOTIFY_LOG="coverage/notifications.log"
